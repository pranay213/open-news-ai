name: openrouter-ai-daily

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: mkdir -p notes

      - run: |
          cat << 'EOF' > generate.cjs
          const fs = require("fs")

          const topics = [
            "AI Agents architecture",
            "RAG production systems",
            "AI SaaS ideas",
            "React AI UI patterns",
            "LLM prompt engineering patterns",
            "Trending GitHub AI tools",
            "Developer productivity with AI",
            "Open source AI stack",
            "Future of AI engineering",
            "AI system design patterns",
            "Vector databases explained",
            "AI automation workflows",
            "Multi agent systems",
            "Edge AI applications",
            "AI coding copilots"
          ]

          const topic = topics[Math.floor(Math.random()*topics.length)]

          async function call(model){
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
              method: "POST",
              headers: {
                "Authorization": "Bearer " + process.env.OPENROUTER_API_KEY,
                "Content-Type": "application/json",
                "HTTP-Referer": "https://github.com",
                "X-Title": "daily-ai"
              },
              body: JSON.stringify({
                model,
                messages: [
                  { role: "user", content: "Write a concise markdown article about: " + topic + " with tools and examples." }
                ]
              })
            })

            const json = await res.json()
            return json?.choices?.[0]?.message?.content || ""
          }

          async function run(){
            const models = [
              "meta-llama/llama-3-8b-instruct:free",
              "google/gemma-7b-it:free",
              "openchat/openchat-7b:free"
            ]

            let text = ""

            for (const m of models){
              text = await call(m)
              if (text) break
            }

            if (!text){
              text = "# " + topic + "\n\nFallback content.\n"
            }

            fs.writeFileSync(`notes/${Date.now()}.md`, text)
          }

          run()
          EOF

      - run: node generate.cjs
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - run: |
          for i in {1..10}
          do
            git add .
            git commit -m "openrouter ai update $i $(date +%s)" || true
          done

      - run: git push
