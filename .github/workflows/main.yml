name: gemini-ai-daily

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: mkdir -p notes

      - run: npm init -y
      - run: npm install @google/generative-ai

      - run: |
          cat << 'EOF' > generate.cjs
          const fs = require("fs")
          const { GoogleGenerativeAI } = require("@google/generative-ai")

          const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY)
          const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" })

          const topics = [
            "AI Agents architecture",
            "RAG production design",
            "AI SaaS ideas",
            "React AI UI patterns",
            "LLM prompt patterns",
            "Trending GitHub repos analysis",
            "AI automation workflows",
            "Open source AI tools",
            "Future AI tech",
            "AI system design"
          ]

          async function run(){
            for (let i = 0; i < 10; i++) {
              const topic = topics[Math.floor(Math.random()*topics.length)]

              const result = await model.generateContent(
                "Write a concise markdown tech note with examples and tools about: " + topic
              )

              const text = result.response.text()

              fs.writeFileSync(`notes/${Date.now()}-${i}.md`, text)
            }
          }

          run()
          EOF

      - run: node generate.cjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - run: |
          for i in {1..10}
          do
            git add .
            git commit -m "gemini ai update $i $(date +%s)" || true
          done

      - run: git push
