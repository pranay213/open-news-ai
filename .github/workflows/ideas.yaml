name: AI Ideas Generator

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:

jobs:
  generate-ideas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate Ideas from Ollama Cloud
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          mkdir -p notes

          RESPONSE=$(curl -s https://ollama.com/api/generate \
            -H "Authorization: Bearer $OLLAMA_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-oss:120b",
              "prompt": "Give 5 new unique money-making ideas for today. Each idea should be practical and simple. Format in markdown with Title, Description, and Earning potential. Avoid repeating previous ideas.",
              "stream": false
            }')

          echo "$RESPONSE" | jq -r '.response' > notes/$(date +%Y-%m-%d-%H-%M).md

      - name: Commit and Push
        run: |
          git config --global user.name "ai-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add notes/
          git commit -m "New ideas $(date)" || echo "No changes"
          git push
